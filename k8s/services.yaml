# ─── Common env helper (referenced by all NestJS services) ─────────────────────
# All backend services share: JWT_SECRET, POSTGRES_HOST, REDIS_HOST

# ─────────────────────────────────────────────────────────────────────────────
# AUTH SERVICE
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: delidrone
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: delidrone/auth-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: production
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_DB
              value: delidrone_auth
            - name: POSTGRES_USER
              value: delidrone
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: delidrone-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              value: redis
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: delidrone-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: delidrone-secrets
                  key: JWT_REFRESH_SECRET
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: delidrone
spec:
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001
---
