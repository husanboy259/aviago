# ─────────────────────────────────────────────────────────────────────────────
# API GATEWAY
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: delidrone
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: delidrone/api-gateway:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: AUTH_SERVICE_URL
              value: http://auth-service:3001
            - name: USER_SERVICE_URL
              value: http://user-service:3002
            - name: RESTAURANT_SERVICE_URL
              value: http://restaurant-service:3003
            - name: ORDER_SERVICE_URL
              value: http://order-service:3004
            - name: DRONE_SERVICE_URL
              value: http://drone-service:3005
            - name: PAYMENT_SERVICE_URL
              value: http://payment-service:3006
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:3007
            - name: ANALYTICS_SERVICE_URL
              value: http://analytics-service:3008
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: delidrone-secrets
                  key: JWT_SECRET
            - name: REDIS_HOST
              value: redis
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: 200m, memory: 384Mi }
            limits:   { cpu: 1000m, memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: delidrone
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
