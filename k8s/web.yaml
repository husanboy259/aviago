apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: delidrone
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: delidrone/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: https://api.delidrone.uz
            - name: NEXT_PUBLIC_WS_URL
              value: wss://api.delidrone.uz
            - name: NEXT_PUBLIC_DRONE_WS_URL
              value: wss://api.delidrone.uz
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: delidrone
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
